# Restic repository
RESTIC_REPO="sftp:${BACKUP_HOST}:${BACKUP_PATH}"

# Dump directory
DUMP_DIR="/srv/backups/dumps"

# PostgreSQL containers: "container:user:database"
# Use "dumpall" as database for full cluster dump
POSTGRES_DUMPS=(
    "immich_postgres:postgres:dumpall"
    "2_pg-root_db-1:postgres:root_db"
)

# MariaDB containers: "container:user:database"
MARIADB_DUMPS=(
    "mariadb:grimmory:grimmory"
)

# SQLite database paths
SQLITE_DBS=(
    "/srv/docker/frigate/config/frigate.db"
    "/srv/docker/pihole/etc-pihole/gravity.db"
    "/srv/docker/pihole/etc-pihole/pihole-FTL.db"
    "/srv/docker/ytptube/config/ytptube.db"
    "/srv/docker/copyparty/hists/o/up2k.db"
    "/srv/docker/copyparty/copyparty/idp.db"
    "/srv/docker/copyparty/copyparty/sessions.db"
    "/srv/docker/homebox/homebox-data/homebox.db"
    "/srv/docker/authelia/config/db.sqlite3"
)

# Directories to include in Restic backup
BACKUP_DIRS=(
    "/srv/docker/"
    "/srv/backups/dumps/"
)

# Paths to exclude from Restic backup (live database files)
BACKUP_EXCLUDES=(
    "*.db"
    "*.db-shm"
    "*.db-wal"
    "*.sqlite3"
)
